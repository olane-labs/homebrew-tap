name: Update Formula

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Package version to update to"
        required: true
        type: string

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download tarball and compute sha256
        id: sha
        run: |
          URL="https://registry.npmjs.org/@olane/o-cli/-/o-cli-${{ inputs.version }}.tgz"
          SHA=$(curl -sL "$URL" | shasum -a 256 | awk '{print $1}')
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Update formula
        run: |
          sed -i \
            -e 's|url ".*"|url "${{ steps.sha.outputs.url }}"|' \
            -e 's|sha256 ".*"|sha256 "${{ steps.sha.outputs.sha256 }}"|' \
            Formula/olane.rb

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/olane.rb
          git commit -m "Update olane to ${{ inputs.version }}"
          git push
